<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📥 Receiver – Secure Exchange</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app {
            width: 100%;
            max-width: 700px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
            padding: 28px 32px 32px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0b1a2f;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 16px;
        }
        h1 small {
            font-size: 14px;
            font-weight: 500;
            color: #5b6f82;
            margin-left: auto;
        }
        .card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 24px;
            border: 1px solid #eef2f6;
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #1e2f40;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 460px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .message-list::-webkit-scrollbar {
            width: 6px;
        }
        .message-list::-webkit-scrollbar-track {
            background: #eef2f6;
            border-radius: 10px;
        }
        .message-list::-webkit-scrollbar-thumb {
            background: #c8d2de;
            border-radius: 10px;
        }
        .message-item {
            background: #fff;
            border-radius: 18px;
            padding: 18px 22px;
            border: 1px solid #eef2f6;
            animation: slideIn 0.25s ease;
        }
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px 12px;
            margin-bottom: 8px;
        }
        .message-meta .from {
            font-weight: 600;
            font-size: 14px;
            color: #0b1a2f;
        }
        .message-meta .time {
            font-size: 12px;
            color: #7b8fa0;
        }
        .message-text {
            font-size: 15px;
            line-height: 1.6;
            color: #1e2f40;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #7b8fa0;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0b1a2f;
            color: #fff;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-info span {
            font-size: 14px;
            font-weight: 500;
            color: #1e2f40;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 6px 16px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-danger {
            background: #fce8e8;
            color: #b13a3a;
        }
        .btn-danger:hover {
            background: #f5d6d6;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .badge-new {
            background: #e74c3c;
            color: #fff;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="flex-between" style="margin-bottom:16px;">
            <h1 style="border:none;padding:0;margin:0;">📥 Secure Receiver <small>User 2</small></h1>
            <div class="user-info">
                <span id="loggedInUser"></span>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                📬 Inbox
                <span id="newMessageBadge" class="badge-new" style="display:none;">New</span>
            </div>
            <div id="inboxList" class="message-list">
                <div class="empty-state"><div class="icon">📭</div><p>No messages received yet.</p></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        (function() {
            'use strict';
            const SUPABASE_URL = '{{SUPABASE_URL}}';
            const SUPABASE_ANON_KEY = '{{SUPABASE_ANON_KEY}}';

            const session = localStorage.getItem('secure_session');
            if (!session) {
                window.location.href = '/login';
                return;
            }
            let sessionData;
            try { sessionData = JSON.parse(session); } catch {
                localStorage.removeItem('secure_session');
                window.location.href = '/login';
                return;
            }
            if (!sessionData.username || sessionData.role !== 'receiver') {
                localStorage.removeItem('secure_session');
                window.location.href = '/login';
                return;
            }

            if (typeof window.supabase === 'undefined') {
                document.getElementById('toast').textContent = '❌ Supabase library not loaded.';
                document.getElementById('toast').classList.add('show');
                return;
            }
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const loggedInUser = document.getElementById('loggedInUser');
            const logoutBtn = document.getElementById('logoutBtn');
            const inboxList = document.getElementById('inboxList');
            const toast = document.getElementById('toast');
            const newBadge = document.getElementById('newMessageBadge');

            let messageCount = 0;
            let hasNewMessage = false;

            // ─── Auth ──────────────────────────────────────────────────────
            loggedInUser.textContent = `👤 ${sessionData.username}`;
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('secure_session');
                window.location.href = '/login';
            });

            // ─── Toast ────────────────────────────────────────────────────
            function showToast(msg, duration = 4000) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
            }

            // ─── Browser Notification ────────────────────────────────────
            function requestNotificationPermission() {
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }

            function sendBrowserNotification(title, body) {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification(title, { body, icon: '📨' });
                }
            }

            // ─── Decryption (same as sender) ─────────────────────────────
            function base64ToArrayBuffer(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return bytes.buffer;
            }

            async function deriveKey(passphrase) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey(
                    'raw',
                    enc.encode(passphrase),
                    'PBKDF2',
                    false,
                    ['deriveKey']
                );
                return crypto.subtle.deriveKey({
                        name: 'PBKDF2',
                        salt: enc.encode('SecureExchangeSalt2026'),
                        iterations: 100000,
                        hash: 'SHA-256'
                    },
                    keyMaterial, { name: 'AES-GCM', length: 256 },
                    false,
                    ['decrypt']
                );
            }

            async function decryptMessage(key, encryptedBase64) {
                const combined = new Uint8Array(base64ToArrayBuffer(encryptedBase64));
                const iv = combined.slice(0, 12);
                const ciphertext = combined.slice(12);
                const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
                return new TextDecoder().decode(decrypted);
            }

            const DEFAULT_PASSPHRASE = 'my-secure-shared-secret';
            let cryptoKey = null;

            async function getCryptoKey() {
                if (!cryptoKey) cryptoKey = await deriveKey(DEFAULT_PASSPHRASE);
                return cryptoKey;
            }

            // ─── Render inbox ────────────────────────────────────────────
            function formatTime(ts) {
                return new Date(ts).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit',
                    minute: '2-digit' });
            }

            function escapeHtml(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }

            async function renderInbox(messages) {
                if (!messages || messages.length === 0) {
                    inboxList.innerHTML =
                        `<div class="empty-state"><div class="icon">📭</div><p>No messages received yet.</p></div>`;
                    messageCount = 0;
                    newBadge.style.display = 'none';
                    return;
                }

                // sort by timestamp descending (newest first)
                const sorted = [...messages].sort((a, b) => b.timestamp - a.timestamp);
                messageCount = sorted.length;

                let html = '';
                const key = await getCryptoKey();
                for (const m of sorted) {
                    let plainText = '🔒 Encrypted (could not decrypt)';
                    try {
                        plainText = await decryptMessage(key, m.text);
                    } catch (e) {
                        console.warn('Decryption failed for message', m.id, e);
                    }
                    html += `<div class="message-item">
                        <div class="message-meta">
                            <span class="from">📤 From: ${m.sender_username || 'Unknown'}</span>
                            <span class="time">${formatTime(m.timestamp)}</span>
                        </div>
                        <div class="message-text">${escapeHtml(plainText)}</div>
                    </div>`;
                }
                inboxList.innerHTML = html;
            }

            // ─── Load initial messages ──────────────────────────────────
            async function loadMessages() {
                try {
                    const { data, error } = await supabase
                        .from('messages')
                        .select('*')
                        .eq('role', 'receiver')
                        .eq('receiver_username', sessionData.username)
                        .order('timestamp', { ascending: false });
                    if (error) throw error;
                    await renderInbox(data || []);
                } catch (err) {
                    console.error(err);
                    showToast('Error loading messages: ' + err.message, 3000);
                }
            }

            // ─── Real-time subscription ──────────────────────────────────
            function subscribeToMessages() {
                const channel = supabase
                    .channel('receiver-inbox')
                    .on(
                        'postgres_changes', {
                            event: 'INSERT',
                            schema: 'public',
                            table: 'messages',
                            filter: `receiver_username=eq.${sessionData.username}`,
                        },
                        async (payload) => {
                            const newMsg = payload.new;
                            // Ignore if it's from the same user (optional)
                            // if (newMsg.sender_username === sessionData.username) return;

                            // Show notification
                            const sender = newMsg.sender_username || 'Someone';
                            showToast(`📨 New message from ${sender}`, 5000);
                            sendBrowserNotification(`Message from ${sender}`, 'You have a new secure message.');

                            // Update badge
                            newBadge.style.display = 'inline-block';
                            // Reload inbox to show the new message
                            await loadMessages();
                            // After loading, if we want to remove badge after a few seconds, but we keep it until user sees it.
                            // Could be removed on click or after a delay.
                            setTimeout(() => {
                                newBadge.style.display = 'none';
                            }, 8000);
                        }
                    )
                    .subscribe((status, err) => {
                        if (err) {
                            console.error('Subscription error:', err);
                            showToast('Real-time connection lost. Refresh to reconnect.', 4000);
                        } else {
                            console.log('Realtime subscription status:', status);
                        }
                    });

                // Return channel for cleanup if needed
                return channel;
            }

            // ─── Init ─────────────────────────────────────────────────────
            async function init() {
                await loadMessages();
                subscribeToMessages();
                // Request browser notification permission
                requestNotificationPermission();
                // Show a welcome toast
                showToast('📬 Live notifications enabled.', 3000);
            }

            init();
        })();
    </script>
</body>
</html>
