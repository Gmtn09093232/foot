<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📥 Receiver – Secure Exchange</title>
  <style>
    /* Same styles – keep them */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .app { width: 100%; max-width: 700px; background: #ffffff; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,20,40,0.12); padding: 28px 32px 32px; }
    h1 { font-size: 24px; font-weight: 700; color: #0b1a2f; display: flex; align-items: center; gap: 10px; margin-bottom: 24px; border-bottom: 2px solid #eef2f6; padding-bottom: 16px; }
    h1 small { font-size: 14px; font-weight: 500; color: #5b6f82; margin-left: auto; }
    .card { background: #f8fafc; border-radius: 20px; padding: 24px 28px; margin-bottom: 24px; border: 1px solid #eef2f6; }
    .card-title { font-size: 15px; font-weight: 600; color: #1e2f40; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #2c3f54; margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 12px 16px; border: 1.5px solid #dde3ea; border-radius: 14px; font-size: 14px; font-family: inherit; background: #fff; transition: border 0.2s, box-shadow 0.2s; color: #0b1a2f; }
    input:focus, textarea:focus { outline: none; border-color: #0b1a2f; box-shadow: 0 0 0 4px rgba(11,26,47,0.08); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 28px; border: none; border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn-primary { background: #0b1a2f; color: #fff; }
    .btn-primary:hover { background: #1a2f47; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(11,26,47,0.25); }
    .btn-secondary { background: #e2e8f0; color: #1e2f40; }
    .btn-secondary:hover { background: #d0d8e3; }
    .btn-danger { background: #fce8e8; color: #b13a3a; }
    .btn-danger:hover { background: #f5d6d6; }
    .btn-block { width: 100%; justify-content: center; }
    .btn-sm { padding: 6px 16px; font-size: 12px; border-radius: 20px; }
    .flex { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .mt-16 { margin-top: 16px; }
    .message-list { display: flex; flex-direction: column; gap: 14px; max-height: 460px; overflow-y: auto; padding-right: 4px; }
    .message-list::-webkit-scrollbar { width: 6px; }
    .message-list::-webkit-scrollbar-track { background: #eef2f6; border-radius: 10px; }
    .message-list::-webkit-scrollbar-thumb { background: #c8d2de; border-radius: 10px; }
    .message-item { background: #fff; border-radius: 18px; padding: 18px 22px; border: 1px solid #eef2f6; animation: slideIn 0.25s ease; }
    @keyframes slideIn { 0% { opacity:0; transform:translateY(8px); } 100% { opacity:1; transform:translateY(0); } }
    .message-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px 12px; margin-bottom: 8px; }
    .message-meta .from { font-weight: 600; font-size: 14px; color: #0b1a2f; }
    .message-meta .time { font-size: 12px; color: #7b8fa0; }
    .message-text { font-size: 15px; line-height: 1.6; color: #1e2f40; white-space: pre-wrap; word-break: break-word; }
    .message-image { margin-top: 12px; max-width: 260px; border-radius: 14px; border: 1px solid #eef2f6; overflow: hidden; }
    .message-image img { width: 100%; height: auto; display: block; }
    .empty-state { text-align: center; padding: 48px 20px; color: #7b8fa0; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0b1a2f; color: #fff; padding: 14px 32px; border-radius: 40px; font-weight: 500; font-size: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.25); opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-info span { font-size: 14px; font-weight: 500; color: #1e2f40; }
    .file-upload-wrap { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 12px 16px; background: #fff; border: 1.5px dashed #dde3ea; border-radius: 14px; transition: border 0.2s; }
    .file-upload-wrap:hover { border-color: #0b1a2f; }
    .file-upload-wrap input[type="file"] { display: none; }
    .file-label { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; background: #eef2f6; border-radius: 30px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; color: #1e2f40; }
    .file-label:hover { background: #dce3ec; }
    .file-name { font-size: 13px; color: #5b6f82; flex: 1; min-width: 80px; }
    .clear-file { background: none; border: none; color: #b13a3a; font-size: 18px; cursor: pointer; padding: 0 6px; font-weight: 600; }
    .file-preview { margin-top: 12px; max-width: 160px; border-radius: 14px; border: 1px solid #eef2f6; overflow: hidden; }
    .file-preview img { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
<div class="app">
  <div class="flex-between" style="margin-bottom:16px;">
    <h1 style="border:none;padding:0;margin:0;">📥 Secure Receiver <small>User 1</small></h1>
    <div class="user-info">
      <span id="loggedInUser"></span>
      <button class="btn btn-danger btn-sm" id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- Profile Photo Upload Section -->
  <div class="card">
    <div class="card-title">🖼️ Profile Photo</div>
    <div class="form-group">
      <div class="file-upload-wrap">
        <label class="file-label" for="profilePhotoInput">📎 Choose photo</label>
        <input type="file" id="profilePhotoInput" accept="image/*" />
        <span class="file-name" id="profilePhotoName">No photo selected</span>
        <button class="clear-file" id="clearProfilePhoto" title="Remove photo">✕</button>
      </div>
      <div id="profilePhotoPreview" class="file-preview" style="display:none;">
        <img id="profilePhotoPreviewImg" src="" alt="profile preview" />
      </div>
    </div>
    <button class="btn btn-primary btn-block" id="uploadProfilePhotoBtn">Upload Profile Photo</button>
  </div>

  <div class="card">
    <div class="flex-between">
      <div class="card-title" style="margin-bottom:0;">📥 Received Messages</div>
      <button class="btn btn-primary btn-sm" id="refreshBtn">🔄 Refresh</button>
    </div>
    <div id="receivedList" class="message-list mt-16">
      <div class="empty-state"><div class="icon">📭</div><p>No messages received yet.<br />Ask User 2 to send one.</p></div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  'use strict';
  const SUPABASE_URL = '{{SUPABASE_URL}}';
  const SUPABASE_ANON_KEY = '{{SUPABASE_ANON_KEY}}';

  const session = localStorage.getItem('secure_session');
  if (!session) {
    window.location.href = '/login';
    return;
  }
  let sessionData;
  try { sessionData = JSON.parse(session); } catch { localStorage.removeItem('secure_session'); window.location.href = '/login'; return; }
  if (!sessionData.username || sessionData.role !== 'receiver') {
    localStorage.removeItem('secure_session');
    window.location.href = '/login';
    return;
  }

  if (typeof window.supabase === 'undefined') {
    document.getElementById('toast').textContent = '❌ Supabase library not loaded.';
    document.getElementById('toast').classList.add('show');
    return;
  }
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // DOM refs
  const loggedInUser = document.getElementById('loggedInUser');
  const logoutBtn = document.getElementById('logoutBtn');
  const receivedList = document.getElementById('receivedList');
  const refreshBtn = document.getElementById('refreshBtn');
  const toast = document.getElementById('toast');
  const profilePhotoInput = document.getElementById('profilePhotoInput');
  const profilePhotoName = document.getElementById('profilePhotoName');
  const clearProfilePhoto = document.getElementById('clearProfilePhoto');
  const profilePhotoPreview = document.getElementById('profilePhotoPreview');
  const profilePhotoPreviewImg = document.getElementById('profilePhotoPreviewImg');
  const uploadProfilePhotoBtn = document.getElementById('uploadProfilePhotoBtn');

  let receiverKey = null;
  let selectedProfilePhotoData = null;

  loggedInUser.textContent = `👤 ${sessionData.username}`;

  function showToast(msg, duration=2800) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
  }

  function logout() {
    localStorage.removeItem('secure_session');
    window.location.href = '/login';
  }
  logoutBtn.addEventListener('click', logout);

  // ─── Profile Photo Upload ──────────────────────────────────────
  function clearProfilePhotoData() {
    selectedProfilePhotoData = null;
    profilePhotoInput.value = '';
    profilePhotoName.textContent = 'No photo selected';
    profilePhotoPreview.style.display = 'none';
    profilePhotoPreviewImg.src = '';
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleProfilePhotoSelect(file) {
    if (!file) { clearProfilePhotoData(); return; }
    if (!file.type.startsWith('image/')) {
      showToast('Please select an image file.', 2000);
      clearProfilePhotoData();
      return;
    }
    try {
      const b64 = await fileToBase64(file);
      selectedProfilePhotoData = b64;
      profilePhotoName.textContent = file.name;
      profilePhotoPreviewImg.src = `data:${file.type};base64,${b64}`;
      profilePhotoPreview.style.display = 'block';
    } catch(e) {
      showToast('Failed to read image.', 2000);
      clearProfilePhotoData();
    }
  }

  async function uploadProfilePhoto() {
    if (!selectedProfilePhotoData) {
      showToast('Please select a photo first.', 2000);
      return;
    }
    try {
      const { error } = await supabase
        .from('users')
        .update({ profile_photo: selectedProfilePhotoData })
        .eq('username', sessionData.username);
      if (error) throw error;
      showToast('✅ Profile photo uploaded successfully!', 2000);
      // Optionally clear the preview
      clearProfilePhotoData();
    } catch (err) {
      console.error(err);
      showToast('Error uploading photo: ' + err.message, 3000);
    }
  }

  profilePhotoInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) {
      handleProfilePhotoSelect(e.target.files[0]);
    } else {
      clearProfilePhotoData();
    }
  });
  clearProfilePhoto.addEventListener('click', clearProfilePhotoData);
  uploadProfilePhotoBtn.addEventListener('click', uploadProfilePhoto);

  // ─── Decryption utilities ──────────────────────────────────────
  function formatTime(ts) { return new Date(ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
  function arrayBufferToBase64(buf) { const bytes = new Uint8Array(buf); let binary=''; for (let i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]); return btoa(binary); }
  function base64ToArrayBuffer(base64) { const binary=atob(base64); const bytes=new Uint8Array(binary.length); for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i); return bytes.buffer; }
  function escapeHtml(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

  async function deriveKey(passphrase) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({ name:'PBKDF2', salt: enc.encode('SecureExchangeSalt2026'), iterations: 100000, hash:'SHA-256' },
      keyMaterial, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  }
  async function decryptMessage(key, ciphertextB64) {
    try {
      const combined = new Uint8Array(base64ToArrayBuffer(ciphertextB64));
      const iv = combined.slice(0, 12);
      const encrypted = combined.slice(12);
      const decrypted = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, encrypted);
      return new TextDecoder().decode(decrypted);
    } catch { return null; }
  }

  // ─── Render received messages ──────────────────────────────────
  async function renderReceivedMessages() {
    // If no key, show message, but we removed the key input. So we'll use a fixed key like sender.
    const DEFAULT_PASSPHRASE = 'my-secure-shared-secret'; // must match sender
    try {
      receiverKey = await deriveKey(DEFAULT_PASSPHRASE);
    } catch(e) {
      showToast('Error deriving key', 2000);
      return;
    }

    try {
      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .eq('role', 'sender')
        .eq('receiver_username', sessionData.username)
        .order('timestamp', { ascending: false });
      if (error) throw error;
      if (!data || data.length === 0) {
        receivedList.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No messages for you yet.<br />Ask User 2 to send one.</p></div>`;
        return;
      }
      const msgs = data.slice().reverse();
      let html = '';
      let anyError = false;
      for (const m of msgs) {
        let decryptedText = '⚠️ Could not decrypt';
        let decryptedOk = false;
        if (m.text) {
          const dec = await decryptMessage(receiverKey, m.text);
          if (dec !== null) { decryptedText = dec; decryptedOk = true; } else anyError = true;
        } else { decryptedText = ''; decryptedOk = true; }
        // If image is present, show it
        const hasImage = m.image && m.image.length > 0;
        let imageSrc = hasImage ? `data:image/jpeg;base64,${m.image}` : null;
        html += `<div class="message-item">
          <div class="message-meta"><span class="from">📥 From: ${m.sender_username || 'Unknown'}</span><span class="time">${formatTime(m.timestamp)}</span></div>
          <div class="message-text">${escapeHtml(decryptedText)}</div>
          ${imageSrc ? `<div class="message-image"><img src="${imageSrc}" alt="received image" /></div>` : ''}
          <div style="margin-top:8px;font-size:12px;color:#7b8fa0;">${decryptedOk ? '🔓 decrypted' : '⚠️ decryption failed'}</div>
        </div>`;
      }
      receivedList.innerHTML = html;
      if (anyError) showToast('Some messages could not be decrypted. Check passphrase.', 3000);
    } catch(err) { console.error(err); showToast('Error loading messages: ' + err.message, 3000); }
  }

  refreshBtn.addEventListener('click', async () => {
    await renderReceivedMessages();
    showToast('Inbox refreshed.', 1200);
  });

  // ─── Initial load ──────────────────────────────────────────────
  renderReceivedMessages();
  showToast('📥 Your inbox. Upload a profile photo if you like.', 3000);
})();
</script>
</body>
</html>
